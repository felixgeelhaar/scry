name: Feature request
description: New capability or change to an existing one.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Avoid jumping to the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        What you would like to see. Concrete API / CLI / config
        sketches are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What did you try first? Why didn't it work? This often
        surfaces a simpler answer than a new feature.

  - type: textarea
    id: context
    attributes:
      label: Use case
      description: |
        Who hits this and how often? Hosted-MCP deployment, single
        operator on stdio, regulated-industry need, etc.
