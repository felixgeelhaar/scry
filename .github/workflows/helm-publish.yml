name: Helm Publish

# Publishes charts/scry as a Helm repository hosted on the
# gh-pages branch. Triggered on tag push (in lockstep with the
# binary release) so chart-versions track the scry release
# stream. Operators add the repo with:
#
#   helm repo add felixgeelhaar https://felixgeelhaar.github.io/scry
#   helm install scry felixgeelhaar/scry
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # writes to gh-pages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git identity
        # chart-releaser-action commits the regenerated index.yaml
        # to gh-pages; git refuses commits without a user.name +
        # user.email configured. Set to the github-actions bot
        # so the gh-pages commit attribution is obvious.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: v3.16.3

      - name: Lint chart
        run: helm lint charts/scry

      - name: Stamp chart version + appVersion from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Helm SemVer: tag without the v prefix.
          sed -i "s/^version: .*/version: ${TAG}/" charts/scry/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${TAG}\"/" charts/scry/Chart.yaml
          cat charts/scry/Chart.yaml

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/scry -d .cr-release-packages

      # chart-releaser-action takes the packaged .tgz, appends it
      # to the gh-pages branch under charts/, and regenerates
      # index.yaml. Idempotent on re-runs against the same tag.
      - name: Publish chart to gh-pages
        uses: helm/chart-releaser-action@a917fd15b20e8b64b94d9158ad54cd6345335584 # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_PACKAGE_PATH: .cr-release-packages
