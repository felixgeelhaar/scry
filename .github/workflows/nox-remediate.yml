# Dependabot replacement. Weekly (and on-demand) OSV dependency upgrades plus
# GitHub Actions pin bumps, opened as one PR and auto-merged when CI is green.
# Delegates to the central felixgeelhaar/.github reusable workflow.
name: Nox Remediate

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    uses: felixgeelhaar/.github/.github/workflows/nox-remediate.yml@main
    secrets: inherit # passes NOX_TOKEN through when defined (needed to bump action pins)
