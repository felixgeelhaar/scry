apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scry
  namespace: scry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scry
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Audit-chain rotation is per-pod; avoid thrashing replicas
      # in/out and losing chain context every minute. Five-minute
      # stabilisation window matches typical agent-traffic burst
      # patterns.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
