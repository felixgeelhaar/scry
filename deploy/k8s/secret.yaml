# Fill in the servers.yml / clients.yml inside this Secret before
# applying. Tokens should be env://VAR refs that resolve from a
# separate Secret bound via envFrom in deployment.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: scry-config
  namespace: scry
  labels:
    app.kubernetes.io/name: scry
type: Opaque
stringData:
  servers.yml: |
    servers: {}
  clients.yml: |
    # Optional. Per-client identity + tool/server scope +
    # deny_fields. See https://github.com/felixgeelhaar/scry
    # for the schema.
    version: 1
    clients: []
