# Sample Ingress. Override host + className + TLS to taste. Not
# applied by default — operators opt in by kubectl apply'ing this
# file explicitly.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scry
  namespace: scry
  labels:
    app.kubernetes.io/name: scry
  annotations:
    # nginx example — adjust for your ingress controller.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - scry.example.com
      secretName: scry-tls
  rules:
    - host: scry.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scry
                port:
                  name: http
