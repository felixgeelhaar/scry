apiVersion: apps/v1
kind: Deployment
metadata:
  name: scry
  namespace: scry
  labels:
    app.kubernetes.io/name: scry
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: scry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scry
          image: ghcr.io/felixgeelhaar/scry:v0.2.0
          imagePullPolicy: IfNotPresent
          args:
            - serve
            - --transport=http
            - --listen=:7777
            - --serve-auth=env://SCRY_ADMIN_TOKEN
            - --audit-dir=/var/lib/scry/audit
            - --audit-max-size=52428800
            - --audit-keep=5
            - --cost-ceiling=1000
            # Uncomment for embedded TLS:
            # - --tls-cert=/etc/scry/certs/tls.crt
            # - --tls-key=/etc/scry/certs/tls.key
          ports:
            - name: mcp
              containerPort: 7777
              protocol: TCP
          env:
            - name: XDG_CONFIG_HOME
              value: /etc
            - name: XDG_DATA_HOME
              value: /var/lib
            - name: SCRY_LOG
              value: json
            - name: SCRY_LOG_LEVEL
              value: info
            # OTel: forward agent traces through to a collector.
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_SERVICE_NAME
              value: scry
          envFrom:
            - secretRef:
                name: scry-tokens
          volumeMounts:
            - name: config
              mountPath: /etc/scry
              readOnly: true
            - name: audit
              mountPath: /var/lib/scry/audit
          startupProbe:
            exec:
              command:
                - /usr/local/bin/scry
                - doctor
                - --audit-dir=/var/lib/scry/audit
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: scry-config
        - name: audit
          persistentVolumeClaim:
            claimName: scry-audit
