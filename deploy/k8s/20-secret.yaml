# Token values live here. Replace the placeholders before applying
# OR (preferred) generate via external secret manager + sealed-secrets
# / external-secrets-operator / sops:
#
#   kubectl -n scry create secret generic scry-tokens \
#     --from-literal=SHOPIFY_TOKEN="$SHOPIFY_TOKEN" \
#     --from-literal=LINEAR_TOKEN="$LINEAR_TOKEN" \
#     --from-literal=SCRY_ADMIN_TOKEN="$SCRY_ADMIN_TOKEN" \
#     --from-literal=DASHBOARD_TOKEN="$DASHBOARD_TOKEN" \
#     --dry-run=client -o yaml > 20-secret.yaml
#
# Do NOT commit the populated form to git.
apiVersion: v1
kind: Secret
metadata:
  name: scry-tokens
  namespace: scry
type: Opaque
stringData:
  SHOPIFY_TOKEN: "REPLACE_ME"
  LINEAR_TOKEN: "REPLACE_ME"
  SCRY_ADMIN_TOKEN: "REPLACE_ME"
  DASHBOARD_TOKEN: "REPLACE_ME"
