# Default values for scry. Override via `helm install -f my-values.yaml`
# or `--set` flags.
#
# Hosted scry pattern: HTTP transport behind a reverse proxy /
# Ingress that terminates TLS. servers.yml + clients.yml ship in
# Secrets; the chart mounts them read-only at /etc/scry/.

image:
  repository: ghcr.io/felixgeelhaar/scry
  # Pinning the tag avoids surprise upgrades. Override to "latest"
  # at your own risk.
  tag: ""  # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

# Number of scry pods. scry's per-server SQLite indexes are local
# to each pod — when replicas > 1, every pod runs introspection
# independently. The PG/Redis storage backends (v0.7) are the path
# to shared state across replicas.
replicaCount: 1

# Transport scry exposes. Hosted deployments use http. stdio is
# only meaningful when an MCP client launches scry as a subprocess
# (not the k8s shape).
transport: http
listen: ":7777"

# Cost/budget knobs forwarded to `scry serve`. Zero values disable.
costCeiling: 1000
sessionWriteLimit: 0
sessionComplexityLimit: 0
cacheTTL: "30s"
cacheMaxEntries: 1000
refreshInterval: "24h"

# servers.yml content. Either inline here OR set
# existingServersSecret to mount a pre-created Secret. Tokens
# should use env://VAR refs that match envFrom secrets below.
serversYaml: |
  servers: {}

# clients.yml content (per-client identity + tool/server scope +
# deny_fields). Same pattern as serversYaml — inline or reference
# an existing Secret.
clientsYaml: ""

# Existing Kubernetes Secret holding servers.yml + clients.yml.
# When set, serversYaml + clientsYaml are ignored.
existingSecretName: ""

# Environment variables sourced from existing Secrets, forwarded
# into the container so env://VAR token refs in servers.yml /
# clients.yml resolve. Example:
#   envFromSecrets:
#     - name: scry-upstream-tokens
#     - name: scry-shared-secret
envFromSecrets: []

# OTel + structured-log knobs.
env:
  - name: OTEL_TRACES_EXPORTER
    value: "none"
  - name: OTEL_METRICS_EXPORTER
    value: "none"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Probes wired against scry's /healthz endpoint (v0.7 ships
# alongside the http transport).
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5

# Pod-level security context — distroless image already runs as
# uid 65532, but make it explicit for any policy engines (Kyverno,
# OPA Gatekeeper) checking the manifests.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 7777
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Prometheus PodMonitor (only enable when prometheus-operator is
# in the cluster + scry is configured to emit metrics).
podMonitor:
  enabled: false
  interval: 30s
  labels: {}

# Index dir for per-server SQLite files. emptyDir is fine for
# stateless deployments (introspection refresh on pod restart);
# for persistent index, set persistence.enabled=true.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""

nodeSelector: {}
tolerations: []
affinity: {}
