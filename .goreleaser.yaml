version: 2
project_name: scry

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: scry
    binary: scry
    main: ./cmd/scry
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/scry/internal/version.Version={{ .Version }}
      - -X github.com/felixgeelhaar/scry/internal/version.Commit={{ .Commit }}
      - -X github.com/felixgeelhaar/scry/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: ["tar.gz"]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

# v0.7: multi-arch Docker images published to GitHub Container
# Registry on every tag. Operators deploying hosted scry pull
# `ghcr.io/felixgeelhaar/scry:vX.Y.Z` instead of building from
# source.
#
# Requires GHCR_TOKEN — a PAT with packages:write on the
# felixgeelhaar account, OR the workflow's GITHUB_TOKEN with the
# `packages: write` permission (preferred). Wired in
# .github/workflows/release.yml.
dockers:
  - id: scry-amd64
    image_templates:
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=scry"
      - "--label=org.opencontainers.image.description=Searchable GraphQL bridge for AI agents"
      - "--label=org.opencontainers.image.source=https://github.com/felixgeelhaar/scry"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: amd64
  - id: scry-arm64
    image_templates:
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=scry"
      - "--label=org.opencontainers.image.description=Searchable GraphQL bridge for AI agents"
      - "--label=org.opencontainers.image.source=https://github.com/felixgeelhaar/scry"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/felixgeelhaar/scry:{{ .Version }}"
    image_templates:
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-amd64"
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-arm64"
  - name_template: "ghcr.io/felixgeelhaar/scry:latest"
    image_templates:
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-amd64"
      - "ghcr.io/felixgeelhaar/scry:{{ .Version }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - merge

release:
  github:
    owner: felixgeelhaar
    name: scry
  draft: false

# Auto-bump the felixgeelhaar/homebrew-tap formula on every tag push.
# Requires HOMEBREW_TAP_TOKEN — a PAT with `contents:write` on
# felixgeelhaar/homebrew-tap — exposed to the goreleaser step in
# .github/workflows/release.yml.
brews:
  - name: scry
    # Skip the brew formula push when HOMEBREW_TAP_TOKEN isn't
    # configured (first release before the operator wires the PAT).
    # Keeps `goreleaser release` from failing on a missing secret.
    skip_upload: '{{ if eq (envOrDefault "HOMEBREW_TAP_TOKEN" "") "" }}true{{ else }}false{{ end }}'
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/felixgeelhaar/scry"
    description: "Searchable GraphQL ↔ MCP bridge for AI agents"
    license: "Apache-2.0"
    commit_author:
      name: github-actions
      email: github-actions@github.com
    commit_msg_template: "scry {{ .Tag }}"
    install: |
      bin.install "scry"
    test: |
      system "#{bin}/scry", "version"
