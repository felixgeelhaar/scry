version: 2
project_name: scry

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: scry
    binary: scry
    main: ./cmd/scry
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/scry/internal/version.Version={{ .Version }}
      - -X github.com/felixgeelhaar/scry/internal/version.Commit={{ .Commit }}
      - -X github.com/felixgeelhaar/scry/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: ["tar.gz"]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - merge

release:
  github:
    owner: felixgeelhaar
    name: scry
  draft: false

# Auto-bump the felixgeelhaar/homebrew-tap formula on every tag push.
# Requires HOMEBREW_TAP_TOKEN — a PAT with `contents:write` on
# felixgeelhaar/homebrew-tap — exposed to the goreleaser step in
# .github/workflows/release.yml.
brews:
  - name: scry
    # Skip the brew formula push when HOMEBREW_TAP_TOKEN isn't
    # configured (first release before the operator wires the PAT).
    # Keeps `goreleaser release` from failing on a missing secret.
    skip_upload: '{{ if eq (envOrDefault "HOMEBREW_TAP_TOKEN" "") "" }}true{{ else }}false{{ end }}'
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/felixgeelhaar/scry"
    description: "Searchable GraphQL ↔ MCP bridge for AI agents"
    license: "Apache-2.0"
    commit_author:
      name: github-actions
      email: github-actions@github.com
    commit_msg_template: "scry {{ .Tag }}"
    install: |
      bin.install "scry"
    test: |
      system "#{bin}/scry", "version"
